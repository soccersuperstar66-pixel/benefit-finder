kind = "web"
previewPath = "/"
title = "Benefit Finder Chatbot"
version = "1.0.0"
id = "artifacts/benefit-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18299

[services.development]
run = "pnpm --filter @workspace/benefit-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/benefit-finder", "run", "build" ]
publicDir = "artifacts/benefit-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18299"
BASE_PATH = "/"
